<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brew & Co. — Café Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="menu.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-brand">
      <div class="brand-icon">☕</div>
      <div class="brand-text">
        <span class="brand-name">BREW &amp; CO.</span>
        <span class="brand-sub">CAFÉ MANAGEMENT</span>
      </div>
    </div>

    <div class="nav-profile">
      <span class="profile-dot"></span>
      <span class="profile-name">karan</span>
    </div>

    <div class="nav-links">
      <button class="nav-btn active" data-page="menu">Menu</button>
      <button class="nav-btn" data-page="order">Order</button>
      
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main">
    <div class="page-header">
      <h1 class="page-title">Our Menu</h1>
      <p class="page-subtitle">Select items and adjust quantity</p>
    </div>

    <!-- CATEGORY FILTERS -->
    <div class="filter-bar">
      <button class="filter-btn active" data-category="all">All</button>
      <button class="filter-btn" data-category="coffee">Coffee</button>
      <button class="filter-btn" data-category="tea">Tea</button>
      <button class="filter-btn" data-category="snacks">Snacks</button>
      <button class="filter-btn" data-category="desserts">Desserts</button>
      <button class="filter-btn" data-category="drinks">Drinks</button>
    </div>

    <!-- MENU GRID -->
    <div class="menu-grid" id="menuGrid">
      <!-- Cards injected by JS -->
    </div>
  </main>

 

  <script src="menu.js"></script>
</body>
</html>
