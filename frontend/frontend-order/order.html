<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brew & Co. — Place Your Order</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="order.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">
      <div class="brand-icon">☕</div>
      <div class="brand-text">
        <span class="brand-name">BREW &amp; CO.</span>
        <span class="brand-sub">CAFÉ MANAGEMENT</span>
      </div>
    </div>

    <div class="nav-profile">
      <span class="profile-dot"></span>
      <span class="profile-name">Guest</span>
    </div>

    <div class="nav-links">
      <button class="nav-btn" data-page="menu">Menu</button>
      <button class="nav-btn active" data-page="order">Order</button>
    </div>
  </nav>

  <main class="main">
    <div class="page-header">
      <h1 class="page-title">Review Order</h1>
      <p class="page-subtitle">Adjust item quantities or proceed to billing</p>
    </div>

    <div class="order-container">
      <div class="order-items-section">
        <div class="order-list" id="orderList">
          </div>
      </div>

      <div class="summary-card">
        <h3 class="summary-title">Summary</h3>
        <div class="summary-divider"></div>
        
        <div class="summary-row">
          <span>Total Items</span>
          <span id="totalItemsCount">0</span>
        </div>
        
        <div class="summary-row total-row">
          <span>Subtotal</span>
          <span id="totalPriceAmount">₹0</span>
        </div>
        
        <button class="checkout-btn" id="checkoutBtn">Proceed to Bill →</button>
      </div>
    </div>
  </main>

  <script src="order.js"></script>
</body>
</html>
